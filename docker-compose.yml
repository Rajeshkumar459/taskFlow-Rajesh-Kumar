services:
  postgres:
    image: postgres:16-alpine
    container_name: taskflow_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", $POSTGRES_USER]
      interval: 2s
      timeout: 2s
      retries: 10
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: taskflow_backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "${APP_PORT}:8080"
    entrypoint: ["/app/entrypoint.sh"]

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    container_name: taskflow_frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"

  frontend-test:
    build:
      context: ./frontend
      target: builder
    command: ["npm", "run", "test"]

  backend-test:
    build:
      context: ./backend
      target: builder
    command: ["go", "test", "./..."]

volumes:
  pg_data: