services:
  postgres:
    image: postgres:16-alpine
    container_name: taskflow_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: taskflow_backend
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "${APP_PORT}:8080"
    entrypoint: ["/app/entrypoint.sh"]

  frontend:
    build: ./frontend
    container_name: taskflow_frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"

  frontend-test:
    build: ./frontend
    command: ["npm", "run", "test"]

  backend-test:
    build:
      context: ./backend
      target: builder
    command: ["go", "test", "./..."]

volumes:
  pg_data: