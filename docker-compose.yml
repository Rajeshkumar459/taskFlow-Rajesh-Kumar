services:
  postgres:
    image: postgres:16-alpine
    container_name: taskflow_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", $POSTGRES_USER]
      interval: 2s
      timeout: 2s
      retries: 10
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build: ./backend-springboot
    container_name: taskflow_backend
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "${APP_PORT}:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    container_name: taskflow_frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"

  frontend-test:
    build:
      context: ./frontend
      target: builder
    command: ["npm", "run", "test"]

  backend-test:
    build:
      context: ./backend-springboot
      target: builder
    command: ["mvn", "test"]
    env_file:
      - .env
    environment:
      - USE_EXTERNAL_DB=true
    depends_on:
      postgres:
        condition: service_healthy
      frontend-test:
        condition: service_completed_successfully

volumes:
  pg_data: